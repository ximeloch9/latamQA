# Configuración de base de datos SQLite
db.path=jdbc:sqlite:data-generator.db

# Configuración de salida de archivos CSV
csv.output.path=output/

# Configuración de correo electrónico (desactivado por defecto)
mail.enabled=false
mail.smtp.host=smtp.example.com
mail.smtp.port=587
mail.smtp.auth=true
mail.smtp.starttls.enable=true
mail.username=user@example.com
mail.password=password
