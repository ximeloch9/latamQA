webdriver {
  driver = chrome
  autodownload = true
  capabilities {
    browserName = "chrome"
    acceptInsecureCerts = true
    "goog:chromeOptions" {
      args = ["remote-allow-origins=*", "test-type", "no-sandbox", "ignore-certificate-errors", "--window-size=1280,1024", "disable-gpu", "disable-default-apps", "disable-popup-blocking"]
    }
  }
}

serenity {
  take.screenshots = AFTER_EACH_STEP
  reports.show.step.details = true
  project.name = "Latam QA Automation POC"
}